name: Bootstrap Ripper VM

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'bootstrap/ripper/**'
      - '.gitea/workflows/bootstrap-ripper.yml'

jobs:
  bootstrap:
    runs-on: [linux, docker]

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          apk add --no-cache openssh-client

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.ARM_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Prepare persistent bootstrap workspace
        run: |
          mkdir -p /workspace/bootstrap-ripper
          find /workspace/bootstrap-ripper -mindepth 1 -maxdepth 1 -exec rm -rf {} +
          cp -a "$GITHUB_WORKSPACE/bootstrap/ripper/." /workspace/bootstrap-ripper/
          chmod +x /workspace/bootstrap-ripper/bootstrap-ripper.sh

      - name: Create ripper.env
        run: |
          cat > /workspace/bootstrap-ripper/ripper.env <<EOF
          VM_IP="192.168.0.155"
          SSH_USER="ubuntu"
          SMB_SERVER="192.168.0.12"
          SMB_SHARE="media"
          SMB_USERNAME="ARM"
          SMB_PASSWORD="${{ secrets.ARM_PASSWORD }}"
          SMB_MOUNT="/mnt/media"
          ARM_USER="arm"
          ARM_GROUP="arm"
          EOF

      - name: Run bootstrap
        run: |
          cd /workspace/bootstrap-ripper
          ./bootstrap-ripper.sh