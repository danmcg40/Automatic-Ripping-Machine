name: Bootstrap Ripper VM

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'bootstrap/ripper/**'
      - '.gitea/workflows/bootstrap-ripper.yml'

jobs:
  bootstrap:
    runs-on: [linux, docker]

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Prepare persistent bootstrap workspace
        run: |
          mkdir -p /workspace/bootstrap-ripper
          find /workspace/bootstrap-ripper -mindepth 1 -maxdepth 1 -exec rm -rf {} +
          cp -a "$GITHUB_WORKSPACE/bootstrap/ripper/." /workspace/bootstrap-ripper/
          chmod +x /workspace/bootstrap-ripper/bootstrap-ripper.sh

      - name: Run bootstrap
        run: |
          cd /workspace/bootstrap-ripper
          ./bootstrap-ripper.sh